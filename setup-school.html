
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EasyStudy | School Setup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="./css/global.css">
  <link rel="stylesheet" href="./css/school.css">
</head>

<body>

  <div class="main-container">
    <div class="card">

      <h2>Welcome to EasyStudy 🎒</h2>
      <p>Select your class to continue</p>

      <select id="classSelect">
        <option value="">Select Class</option>
        <option value="6">Class 6</option>
        <option value="7">Class 7</option>
        <option value="8">Class 8</option>
        <option value="9">Class 9</option>
        <option value="10">Class 10</option>
        <option value="11">Class 11</option>
        <option value="12">Class 12</option>
      </select>

      <button type="button" class="primary-btn" id="saveClassBtn">
        Continue
      </button>

      <p class="footer">Built with 💜 by Mukesh</p>

    </div>
  </div>

  <script type="module" src="./js/school.js"></script>

</body>
</html>
