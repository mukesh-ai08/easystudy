 <!DOCTYPE html>
<html>
<head>
 <style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .card {
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    width: 300px;
    text-align: center;
  }

  input {
    width: 90%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
  }

  button {
    padding: 10px 15px;
    margin: 8px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    color: white;
    background: #667eea;
  }

  button:hover {
    background: #5a67d8;
  }
 </style>
  <title>EasyStudy</title>
</head>
<body>

 <div class="card">
  <h2>EasyStudy Login</h2>

  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="password" placeholder="Enter Password">

  <button id="signupBtn">Sign Up</button>
  <button id="loginBtn">Login</button>
</div>
 <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
  from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDNT5bDtlPyoSBZvv_NFTmATIMLRIvpBLQ",
    authDomain: "easystudy-96fa3.firebaseapp.com",
    projectId: "easystudy-96fa3",
    storageBucket: "easystudy-96fa3.firebasestorage.app",
    messagingSenderId: "222839424679",
    appId: "1:222839424679:web:e25be32c8936b4d6643d82"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  document.getElementById("signupBtn").addEventListener("click", () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
      .then(() => alert("Signup Successful!"))
      .catch(error => alert(error.message));
  });

  document.getElementById("loginBtn").addEventListener("click", () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
      .then(() => alert("Login Successful!"))
      .catch(error => alert(error.message));
  });
</script>

</body>
</html>
