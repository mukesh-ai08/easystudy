 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EasyStudy | Build Discipline. Build Future.</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="./css/global.css">
  <link rel="stylesheet" href="./css/login.css">
</head>

<body>

  <div class="main-container">
    <div class="card">

      <h1 class="logo">EASYSTUDY</h1>
      <p class="tagline">Build Discipline. Build Future.</p>

      <!-- Role Selection -->
      <div class="role-selection">
        <button class="role-btn" id="schoolBtn">🎒 School</button>
        <button class="role-btn" id="collegeBtn">🎓 College</button>
       
      </div>

      <!-- Email -->
      <input type="email" id="email" placeholder="Enter your email">

      <!-- Password -->
      <div class="password-box">
        <input type="password" id="password" placeholder="Enter your password">
        <span id="togglePassword">👁️</span>
      </div>

      <!-- Buttons -->
      <button type="button" class="primary-btn" id="signupBtn">Sign Up</button>
      <button type="button" class="secondary-btn" id="loginBtn">Login</button>
      <button id="googleLogin" class="google-btn"> 🔵 Continue with Google
      </button>
      <p class="footer">Built with 💜 by Mukesh</p>

    </div>
  </div>

  <!-- JS Modules -->
  <script type="module" src="./js/firebase.js"></script>
  <script type="module" src="./js/role.js"></script>
  <script type="module" src="./js/auth.js"></script>

</body>
</html>
